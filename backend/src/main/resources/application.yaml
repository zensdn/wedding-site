spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${WEBSITE_GMAIL}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  application:
    name: sofistudio
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    user:
      name: ${ADMIN_PANEL_USERNAME}
      password: ${ADMIN_PANEL_PASSWORD}
cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}
app:
  admin-email: ${ADMIN_GMAIL}
  admin-panel-username: ${ADMIN_PNL_USERNAME}
  admin-panel-password: ${ADMIN_PNL_PASSWORD}
